# =============================================================================

# ~/.config/hypr/source/workspace_rules.conf
# -----------------------------------------------------
# IMMUTABLE BASE - Do not edit manually
# -----------------------------------------------------

# 1. FAILSAFE DEFAULTS
# These guarantee the system boots even if the user file is corrupted or missing.
$WS_MAIN_LAYOUT = dwindle
$WS_8_LAYOUT = monocle
$WS_9_LAYOUT = master
$WS_10_LAYOUT = scrolling

# 3. APPLY RULES
# The engine now applies the rules based on the final, resolved variables.
workspace = r[1-7], layout:$WS_MAIN_LAYOUT
workspace = 8, layout:$WS_8_LAYOUT
workspace = 9, layout:$WS_9_LAYOUT
workspace = 10, layout:$WS_10_LAYOUT
